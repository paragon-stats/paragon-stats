default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        args: [-c, .github/linters/.markdownlint.yml]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .github/linters/.yaml-lint.yml]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format (verify)
        language: system
        entry: dotnet format --verify-no-changes --severity error
        files: \.cs$
        pass_filenames: false
      - id: conventional-commit
        name: Conventional Commit message
        # language: python -> pre-commit provisions the interpreter, so this works
        # on Windows/macOS/Debian without depending on system `py`/`python`/`python3`.
        language: python
        stages: [commit-msg]
        entry: python scripts/check_commit_message.py
