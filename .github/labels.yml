# Label taxonomy (synced by labels-sync.yml). Colors aligned with the
# maintainer's other repos: type/* azure, area/* purple, priority traffic-light.
- name: "type/feat"
  color: "1d76db"
  description: "New feature"
- name: "type/fix"
  color: "1d76db"
  description: "Bug fix"
- name: "type/bug"
  color: "1d76db"
  description: "Bug report / defect"
- name: "type/enh"
  color: "1d76db"
  description: "Enhancement / improvement"
- name: "type/perf"
  color: "1d76db"
  description: "Performance improvement"
- name: "type/security"
  color: "1d76db"
  description: "Security-specific change"
- name: "type/refactor"
  color: "1d76db"
  description: "Restructure without behavior change"
- name: "type/test"
  color: "1d76db"
  description: "Tests-only change"
- name: "type/chore"
  color: "1d76db"
  description: "Tooling, config, hygiene"
- name: "type/docs"
  color: "1d76db"
  description: "Documentation change"
- name: "area/core"
  color: "6f42c1"
  description: "ParagonStats.Core engine/domain"
- name: "area/cli"
  color: "6f42c1"
  description: "ParagonStats.Cli"
- name: "area/tests"
  color: "6f42c1"
  description: "Test projects"
- name: "area/ci"
  color: "6f42c1"
  description: "CI/CD, workflows, automation"
- name: "area/docs"
  color: "6f42c1"
  description: "Documentation"
- name: "area/build"
  color: "6f42c1"
  description: "Build config, packaging, versioning"
- name: "priority/P0"
  color: "e11d48"
  description: "Critical / blocking"
- name: "priority/P1"
  color: "f97316"
  description: "High"
- name: "priority/P2"
  color: "eab308"
  description: "Medium"
- name: "priority/P3"
  color: "22c55e"
  description: "Low"
- name: "status/wip"
  color: "fef2c0"
