version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    # Conventional-Commit prefix so dependabot's commits pass the commitlint
    # check; `chore` doesn't trigger a release-please version bump.
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    groups:
      analyzers:
        patterns:
          - "StyleCop.Analyzers"
          - "Meziantou.Analyzer"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    groups:
      github-actions:
        patterns:
          - "*"
