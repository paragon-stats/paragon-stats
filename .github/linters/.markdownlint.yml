default: true
# Allow long lines in prose; never flag code blocks or tables.
MD013:
  line_length: 200
  code_blocks: false
  tables: false
# A small set of inline HTML elements is allowed (badges, layout).
MD033:
  allowed_elements: [div, span, img, br, p, a]
# Hardened (#18): ul-indent on (markdownlint default, 2-space); ol-prefix permissive
# (one-or-ordered); compact single-space tables now that the editor no longer
# Prettier-aligns markdown.
MD029:
  style: one_or_ordered
MD060:
  style: compact
