default: true
# Allow long lines in prose; never flag code blocks or tables.
MD013:
  line_length: 200
  code_blocks: false
  tables: false
# A small set of inline HTML elements is allowed (badges, layout).
MD033:
  allowed_elements: [div, span, img, br, p, a]
# ul-indent is governed by .editorconfig; ol-prefix conflicts with our numbered lists.
MD007: false
MD029: false
# Table column alignment fights the repo's markdown auto-formatter; not worth enforcing.
MD060: false
