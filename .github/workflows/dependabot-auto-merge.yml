# Auto-merge for Dependabot PRs. ACTIVATION (operator, post-merge):
#   - Enable the repo setting "Allow auto-merge" (else `gh pr merge --auto` errors).
#   - Approval model: the #9 ruleset requires a Code-Owner review, which a bot can't give.
#     Either keep it and approve Dependabot PRs yourself (this then squash-merges on green
#     with no manual merge), or drop Code-Owner-required so it's fully hands-off.
# The on:pull_request + write-permissions pattern is GitHub's documented Dependabot
# auto-merge approach; the explicit permissions block grants the run write access.
name: dependabot-auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
      # Patch + minor: enable auto-merge (squash; the ruleset forbids merge commits).
      # Idempotent, so it's safe to re-run on every push to the PR.
      - name: Auto-merge patch and minor updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
      # Major: leave for manual review; comment once (on open) so it isn't spammed.
      - name: Flag major updates for manual review
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-major' && (github.event.action == 'opened' || github.event.action == 'reopened') }}
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment "$PR_URL" --body "Major version update -- not auto-merged; review manually."
