name: issue-triage

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body || "";
            const m = body.match(/Risk \/ Severity\s*[\r\n]+\s*(low|medium|high|critical)/i);
            if (!m) return;
            const map = { critical: "priority/P0", high: "priority/P1", medium: "priority/P2", low: "priority/P3" };
            const want = map[m[1].toLowerCase()];
            const issue_number = context.payload.issue.number;
            const current = (await github.rest.issues.listLabelsOnIssue({ ...context.repo, issue_number })).data.map(l => l.name);
            // Apply the wanted label FIRST so a later removal failure can never
            // leave the issue without a priority label. Collect every non-404
            // failure (add or remove) and surface them together at the end; 404 =
            // label already gone (race with a concurrent edit), ignored.
            const failures = [];
            if (!current.includes(want)) {
              try {
                await github.rest.issues.addLabels({ ...context.repo, issue_number, labels: [want] });
              } catch (err) {
                failures.push(`add ${want}: ${err.status || err.message}`);
              }
            }
            for (const name of current.filter(l => l.startsWith("priority/") && l !== want)) {
              try {
                await github.rest.issues.removeLabel({ ...context.repo, issue_number, name });
              } catch (err) {
                if (err.status !== 404) failures.push(`remove ${name}: ${err.status || err.message}`);
              }
            }
            // Fail loud on any genuine error (403 permission, 429 rate-limit) — per
            // #30 these must surface, not be swallowed — but only after the wanted
            // label is in place, so the issue is never left mislabeled.
            if (failures.length) {
              throw new Error(`issue-triage: ${failures.length} label op(s) failed: ${failures.join("; ")}`);
            }
