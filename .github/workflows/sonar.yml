name: sonar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: false  # required check: a cancelled run must still report (#14)

jobs:
  sonar:
    # Fork and Dependabot PRs run with a read-only token and can't read
    # SONAR_TOKEN. Skip the scan on those (a job-level skip reports the `sonar`
    # check as "Skipped", which branch protection treats as satisfied — unlike a
    # workflow/path skip, which never reports and freezes the PR). Pushes to main
    # always run, so merged changes are still analysed.
    if: ${{ github.event_name != 'pull_request' || (!github.event.pull_request.head.repo.fork && github.actor != 'dependabot[bot]') }}
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      # The .NET scanner reads SONAR_TOKEN from the environment (begin + end),
      # so the token never appears on a command line.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # MinVer + Sonar need full history
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5
        with:
          global-json-file: global.json
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v4 (SonarScanner needs a JRE 17+)
        with:
          distribution: temurin
          java-version: '21'
      - run: dotnet restore
      - run: dotnet tool restore
      # begin -> build -> tests+coverage -> end: the MSBuild scanner analyses the
      # build between begin/end and ingests coverage via vscoveragexml (#24).
      - name: SonarScanner begin
        run: >
          dotnet tool run dotnet-sonarscanner begin
          /k:"paragon-stats_paragon-stats"
          /o:"paragon-stats"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml
          /d:sonar.coverage.exclusions=scripts/**
          /d:sonar.qualitygate.wait=true
      - run: dotnet build --no-incremental --no-restore
      - name: Test with coverage
        run: dotnet tool run dotnet-coverage collect "dotnet test --no-build" -f xml -o coverage.xml
      - name: SonarScanner end
        if: always()  # post a definite Sonar status even if a prior step failed (avoids the #14 freeze)
        run: dotnet tool run dotnet-sonarscanner end
