name: commitlint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: false  # required check: a cancelled run must still report (#14)

jobs:
  commitlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # need the full PR commit range
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          global-json-file: global.json
      # Reuse the same C# Conventional-Commit validator the local Husky.Net commit-msg
      # hook runs, so the rules are identical locally and in CI (no node/commitlint).
      - name: Validate PR commit messages
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          fail=0
          for sha in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            git log -1 --format=%B "$sha" > /tmp/commit-msg.txt
            mapfile -t paths < <(git diff-tree --no-commit-id --name-only -r "$sha")
            if ! dotnet run scripts/git/check-commit-message.cs -- /tmp/commit-msg.txt "${paths[@]}"; then
              echo "::error::Bad commit (bad format, or feat/fix without a src/ change): $(git log -1 --format='%h %s' "$sha")"
              fail=1
            fi
          done
          exit "$fail"
