name: commitlint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need the full PR commit range
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      # Reuse the same C# Conventional-Commit validator the local Husky.Net commit-msg
      # hook runs, so the rules are identical locally and in CI (no node/commitlint).
      - name: Validate PR commit messages
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          fail=0
          for sha in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            git log -1 --format=%B "$sha" > /tmp/commit-msg.txt
            if ! dotnet run scripts/git/check-commit-message.cs -- /tmp/commit-msg.txt; then
              echo "::error::Non-conventional commit: $(git log -1 --format='%h %s' "$sha")"
              fail=1
            fi
          done
          exit "$fail"
