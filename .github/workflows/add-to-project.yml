name: add-to-project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  contents: read

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # secrets can't be used in `if:`, so bridge the PAT's presence through a job env var.
    # No-ops cleanly until ADD_TO_PROJECT_PAT exists (GITHUB_TOKEN can't write org Projects v2).
    env:
      HAS_PAT: ${{ secrets.ADD_TO_PROJECT_PAT != '' }}
    steps:
      - if: env.HAS_PAT == 'true'
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd  # v2.0.0
        with:
          project-url: https://github.com/orgs/paragon-stats/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
