name: labels-sync

on:
  push:
    branches: [main]
    paths: [".github/labels.yml"]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d  # v6
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
