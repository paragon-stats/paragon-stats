name: super-linter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Super-Linter reports results back to the PR; without these it logs 403s and
  # silently skips the reports (statuses + summary comment), keeping only the
  # job's own pass/fail.
  statuses: write       # MULTI_STATUS — one commit status per linted language
  pull-requests: write  # ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT — PR summary

# Do not cancel in-progress runs: a cancelled run would leave the required `lint`
# check stuck "Expected" (freeze risk, #14). This job has no path/fork filter, so it
# always runs to a terminal status. On a low-traffic repo the redundant runner time
# from not cancelling superseded runs is negligible.
concurrency:
  group: super-linter-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # Super-Linter diffs changed files against the default branch
      # Load the shared VALIDATE_*/config from .github/super-linter.env so CI and the
      # local runner (scripts/dev/run-super-linter.cs) stay in lockstep. Strip comments
      # and blank lines; the rest is NAME=value, the format $GITHUB_ENV expects.
      - name: Load shared Super-Linter config
        shell: bash
        run: grep -vE '^[[:space:]]*(#|$)' .github/super-linter.env >> "$GITHUB_ENV"
      - name: Super-Linter
        uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918  # v8.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: origin/${{ github.event.repository.default_branch }}
          # Report results back to the PR (requires the statuses/pull-requests
          # write permissions above). Fork PRs get a read-only token regardless of
          # those permissions, so skip the reporting there to avoid 403 noise; the
          # summary comment only makes sense on a pull_request event, not on push.
          MULTI_STATUS: ${{ !github.event.pull_request.head.repo.fork }}
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: ${{ github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
