name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"  # weekly baseline scan

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (csharp)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality
      # C# is compiled, so CodeQL needs a real build (more reliable than autobuild
      # with Central Package Management + analyzers).
      - run: dotnet build --no-incremental
      - uses: github/codeql-action/analyze@v3
