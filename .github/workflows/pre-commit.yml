name: pre-commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # CI-only polyglot/secret/hygiene linting (markdown, yaml, actions, gitleaks).
      # Local git hooks are Husky.Net (.NET-native), so nothing is skipped here. This
      # workflow + .pre-commit-config.yaml are removed once Super-Linter (#27) takes
      # over polyglot linting in CI.
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
