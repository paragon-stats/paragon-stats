name: pre-commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The official action installs, caches, and runs pre-commit (default:
      # `run --all-files`) — no raw `pip install` for the GitHub Actions analyzer to
      # flag, and it manages its own hook-env cache.
      - uses: pre-commit/action@v3.0.1
        env:
          # dotnet format runs in build.yml (needs the SDK; CI-enforced there) — skip
          # to avoid a redundant restore + double-run. The commit-msg conventional-commit
          # hook isn't a pre-commit-stage hook, so `pre-commit run` doesn't execute it
          # (CI enforcement is #26). When Super-Linter (#27) lands it takes over
          # markdown/yaml/actions linting — add markdownlint,yamllint,actionlint to SKIP.
          SKIP: dotnet-format
